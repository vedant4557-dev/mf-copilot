# infra/nginx.conf
# MF Copilot — NGINX reverse proxy + TLS termination

worker_processes auto;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────
  log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"ip":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"referer":"$http_referer",'
    '"ua":"$http_user_agent",'
    '"rt":"$request_time"}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log  warn;

  # ── Rate limiting zones ───────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
  limit_req_zone $binary_remote_addr zone=ai:10m     rate=20r/m;
  limit_req_zone $binary_remote_addr zone=uploads:10m rate=5r/m;

  # ── Upstream pools ────────────────────────────────────────────
  upstream api_backend {
    least_conn;
    server api:4000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream web_frontend {
    server web:3000;
    keepalive 16;
  }

  upstream cas_parser {
    server cas-parser:5000;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────
  server {
    listen 80;
    server_name copilot.example.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS main server ─────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name copilot.example.com;

    # TLS
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                          always;
    add_header X-Content-Type-Options     nosniff                                       always;
    add_header X-XSS-Protection           "1; mode=block"                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;

    # File upload size (CAS PDF max 10MB)
    client_max_body_size 12M;

    # ── API routes ──────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://api_backend/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 60s;
    }

    # AI endpoints — stricter rate limit
    location /api/ai/ {
      limit_req zone=ai burst=5 nodelay;

      proxy_pass         http://api_backend/api/ai/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 120s;  # AI can be slow
    }

    # CAS file uploads
    location /api/cas/ {
      limit_req zone=uploads burst=2 nodelay;

      proxy_pass         http://cas_parser/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_read_timeout 90s;
    }

    # WebSocket (Socket.io)
    location /socket.io/ {
      proxy_pass         http://api_backend/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
    }

    # Frontend (Next.js)
    location / {
      proxy_pass         http://web_frontend/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Next.js HMR websocket (dev)
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }
}
