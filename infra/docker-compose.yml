version: "3.9"

# ─────────────────────────────────────────────────────────────
# MF Copilot — Production Docker Compose
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────

services:

  # ── Frontend ────────────────────────────────────────────────
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env.web
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── API Server (2 replicas for HA) ───────────────────────────
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    env_file: .env.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── CAS Parser (Python FastAPI) ──────────────────────────────
  cas-parser:
    build:
      context: services/cas-parser
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file: .env.api
    volumes:
      - ./uploads:/tmp/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout:  15s
      retries:  3

  # ── NAV Ingestion Cron ───────────────────────────────────────
  ingestion:
    build:
      context: services/ingestion-service
      dockerfile: Dockerfile
    env_file: .env.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - RUN_ON_START=false
    restart: always

  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    environment:
      POSTGRES_DB:       ${DB_NAME:-mfcopilot}
      POSTGRES_USER:     ${DB_USER:-mfcopilot}
      POSTGRES_PASSWORD: ${DB_PASS}
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-mfcopilot}"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redisdata:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  # ── NGINX Reverse Proxy + TLS ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  pgdata:     {}
  redisdata:  {}
  nginx_logs: {}
